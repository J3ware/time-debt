<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Time Debt</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <!-- Instructions Popup -->
        <div id="instructions-popup" class="popup hidden">
            <div class="popup-content">
                <h1>TIME DEBT</h1>
                <p>Tap before the timer hits zero.</p>
                <p>Each tap costs you the time you had left.</p>
                <p class="tier-hint">The closer to zero, the better your score:</p>
                <p class="tier-examples">PERFECT ≤0.005 | GREAT ≤0.050</p>
                <p>How long can you survive?</p>
                <button id="got-it-button" class="arcade-button">GOT IT</button>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="screen hidden">
            <div class="timer-container">
                <svg class="timer-ring" viewBox="0 0 200 200">
                    <circle 
                        class="timer-ring-circle" 
                        cx="100" 
                        cy="100" 
                        r="90"
                        fill="none"
                        stroke="#e0e0e0"
                        stroke-width="8"
                    />
                </svg>
                <div id="timer-display" class="timer">1.000</div>
            </div>
            <button id="start-button" class="arcade-button">START</button>
        </div>

        <!-- Gameplay Screen -->
        <div id="gameplay-screen" class="screen hidden">
            <div class="timer-container">
                <svg class="timer-ring" viewBox="0 0 200 200">
                    <circle 
                        id="timer-ring-bg"
                        class="timer-ring-circle timer-ring-bg" 
                        cx="100" 
                        cy="100" 
                        r="90"
                        fill="none"
                        stroke="#333"
                        stroke-width="8"
                    />
                    <circle 
                        id="timer-ring-progress"
                        class="timer-ring-circle timer-ring-progress" 
                        cx="100" 
                        cy="100" 
                        r="90"
                        fill="none"
                        stroke="#e0e0e0"
                        stroke-width="8"
                        stroke-linecap="butt"
                        transform="rotate(-90 100 100)"
                    />
                </svg>
                <div id="timer" class="timer">1.000</div>
            </div>
            <div id="score">0</div>
            <div id="instruction">tap anywhere</div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameover-screen" class="screen hidden">
            <div class="score-taps-row">
                <div class="score-box">
                    <label>SCORE</label>
                    <div id="final-score" class="value">0</div>
                </div>
                <div class="taps-box">
                    <label>TAPS</label>
                    <div id="final-taps" class="value">0</div>
                </div>
            </div>
            <div id="personal-best-message" class="hidden"></div>
            <div id="tier-breakdown"></div>
            <div id="initials-submit-row">
                <div id="initials-input">
                    <div class="initial-column">
                        <button class="arrow-btn up" data-index="0">▲</button>
                        <span class="initial-slot" data-index="0">A</span>
                        <button class="arrow-btn down" data-index="0">▼</button>
                    </div>
                    <div class="initial-column">
                        <button class="arrow-btn up" data-index="1">▲</button>
                        <span class="initial-slot" data-index="1">A</span>
                        <button class="arrow-btn down" data-index="1">▼</button>
                    </div>
                    <div class="initial-column">
                        <button class="arrow-btn up" data-index="2">▲</button>
                        <span class="initial-slot" data-index="2">A</span>
                        <button class="arrow-btn down" data-index="2">▼</button>
                    </div>
                </div>
                <button id="submit-button" class="arcade-button">SUBMIT</button>
            </div>
            <button id="newgame-only-button" class="arcade-button hidden">NEW GAME</button>
        </div>

        <!-- Leaderboard Screen -->
        <div id="leaderboard-screen" class="screen hidden">
            <div id="leaderboard-title">LEADERBOARD</div>
            <div id="leaderboard-list"></div>
            <button id="newgame-button" class="arcade-button">NEW GAME</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
